<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOKO KRUNCH Project | Abyan Mumtaz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&display=swap');

        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-red: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .close-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            backdrop-filter: blur(10px);
            z-index: 1000;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn:hover { background: var(--accent-red); transform: rotate(90deg); }

        .viewer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .project-header { padding: 1rem 0 2rem 0; }
        .project-header h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; text-transform: uppercase; letter-spacing: -1px; line-height: 1; }
        .project-header p { color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.5rem; }

        .display-section {
            position: relative;
            width: 100%;
            height: 65vh;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .main-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); padding: 2rem; }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .nav-arrow:hover { background: var(--accent-red); transform: translateY(-50%) scale(1.1); }
        .prev-arrow { left: 2rem; }
        .next-arrow { right: 2rem; }

        .thumbnail-container { margin-top: 2rem; width: 100%; background: rgba(255, 255, 255, 0.02); padding: 1.5rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .thumbnail-scroll { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: thin; scrollbar-color: var(--accent-red) transparent; }
        .thumbnail-scroll::-webkit-scrollbar { height: 4px; }
        .thumbnail-scroll::-webkit-scrollbar-thumb { background: var(--accent-red); border-radius: 10px; }

        .thumb { flex: 0 0 120px; height: 90px; border-radius: 12px; overflow: hidden; cursor: pointer; opacity: 0.3; transition: all 0.4s ease; border: 2px solid transparent; }
        .thumb:hover { opacity: 0.7; transform: translateY(-5px); }
        .thumb.active { opacity: 1; border-color: var(--accent-red); transform: scale(1.05) translateY(-5px); box-shadow: 0 10px 20px rgba(255, 0, 0, 0.2); }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .footer-info { margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.9rem; }

        @media (max-width: 768px) {
            .display-section { height: 50vh; }
            .nav-arrow { width: 40px; height: 40px; font-size: 1rem; }
            .thumb { flex: 0 0 80px; height: 60px; }
        }
    </style>
</head>

<body>

    <a href="multimedia-advertising.html" class="close-btn">✕</a>

    <div class="viewer-container">
        <header class="project-header">
            <p>Project Detail</p>
            <h1>KOKO KRUNCH</h1>
        </header>

        <section class="display-section">
            <button class="nav-arrow prev-arrow" onclick="prevImage()">❮</button>
            <img id="mainImage" src="KOKOKRUCH%20HASIL/koko%20crunch-masjid.png" alt="Koko Krunch Project" class="main-image">
            <button class="nav-arrow next-arrow" onclick="nextImage()">❯</button>
        </section>

        <div class="thumbnail-container">
            <div class="thumbnail-scroll" id="thumbScroll">
                <div class="thumb active" onclick="changeImage(0)">
                    <img src="KOKOKRUCH%20HASIL/koko%20crunch-masjid.png" alt="Masjid Result">
                </div>
                <div class="thumb" onclick="changeImage(1)">
                    <img src="KOKOKRUCH%20HASIL/213419bfda840f0a730fe10b349e4fdf.jpg" alt="Social Media Result">
                </div>
            </div>
        </div>

        <div class="footer-info">
            <span>&copy; 2026 Recognize Potential</span>
            <span id="imageCounter">1 / 2</span>
        </div>
    </div>

    <script>
        const images = [
            "KOKOKRUCH%20HASIL/koko%20crunch-masjid.png",
            "KOKOKRUCH%20HASIL/213419bfda840f0a730fe10b349e4fdf.jpg"
        ];
        let currentIndex = 0;

        function changeImage(index) {
            currentIndex = index;
            const mainImg = document.getElementById('mainImage');
            const counter = document.getElementById('imageCounter');
            mainImg.style.opacity = '0';
            setTimeout(() => {
                mainImg.src = images[currentIndex];
                mainImg.style.opacity = '1';
                counter.innerText = `${currentIndex + 1} / ${images.length}`;
                const thumbs = document.querySelectorAll('.thumb');
                thumbs.forEach((t, i) => {
                    if(i === currentIndex) {
                        t.classList.add('active');
                        t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    } else { t.classList.remove('active'); }
                });
            }, 300);
        }

        function nextImage() { let next = (currentIndex + 1) % images.length; changeImage(next); }
        function prevImage() { let prev = (currentIndex - 1 + images.length) % images.length; changeImage(prev); }
        document.addEventListener('keydown', (e) => { if (e.key === "ArrowRight") nextImage(); if (e.key === "ArrowLeft") prevImage(); });
    </script>
</body>
</html>
